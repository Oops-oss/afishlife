<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>霍兰德职业兴趣测试 - 测测你的职场性格</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <!-- 欢迎页 -->
    <section id="welcome-page" class="page page-welcome active">
      <!-- 背景效果 -->
      <div class="bg-gradient-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
      </div>
      <div class="bg-grid"></div>
      
      <div class="welcome-content">
        <div class="welcome-icon">
          <div class="icon-badge">
            <!-- Hexagon Icon -->
            <svg viewBox="0 0 24 24">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
        </div>
        
        <h1 class="welcome-title">测测你的职场性格</h1>
        <p class="welcome-subtitle">基于霍兰德职业兴趣理论，发现你的职业潜能</p>
        
        <!-- 维度关键词标签 -->
        <div class="dimension-tags">
          <span class="dim-tag" data-type="R">
            <span class="tag-icon">
              <svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
            </span>
            行动派
          </span>
          <span class="dim-tag" data-type="I">
            <span class="tag-icon">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
            </span>
            思想家
          </span>
          <span class="dim-tag" data-type="A">
            <span class="tag-icon">
              <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            </span>
            创意家
          </span>
          <span class="dim-tag" data-type="S">
            <span class="tag-icon">
              <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </span>
            社交达人
          </span>
          <span class="dim-tag" data-type="E">
            <span class="tag-icon">
              <svg viewBox="0 0 24 24"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
            </span>
            领导者
          </span>
          <span class="dim-tag" data-type="C">
            <span class="tag-icon">
              <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            </span>
            规划师
          </span>
        </div>
        
        <div class="welcome-info">
          <div class="info-item">
            <span class="info-icon">
              <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            </span>
            <span>60道精选题目</span>
          </div>
          <div class="info-item">
            <span class="info-icon">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </span>
            <span>约5-8分钟</span>
          </div>
        </div>
        
        <!-- 价值主张 -->
        <div class="value-props">
          <div class="prop-item">
            <span class="prop-icon">
              <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            </span>
            <span>发现你的独特优势</span>
          </div>
          <div class="prop-item">
            <span class="prop-icon">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
            </span>
            <span>找到理想职业方向</span>
          </div>
          <div class="prop-item">
            <span class="prop-icon">
              <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            </span>
            <span>获得专业发展建议</span>
          </div>
        </div>
        
        <button id="start-btn" class="btn btn-primary btn-start">
          <span class="btn-icon">
            <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </span>
          <span class="btn-text">开始测试</span>
        </button>
        
        <p class="welcome-tip">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
          根据真实感受作答，结果更准确
        </p>
        
        <!-- 浮动装饰元素 -->
        <div class="welcome-decorations">
          <div class="deco-shape deco-1"></div>
          <div class="deco-shape deco-2"></div>
          <div class="deco-shape deco-3"></div>
          <div class="deco-shape deco-4"></div>
        </div>
      </div>
    </section>

    <!-- 测试页 -->
    <section id="test-page" class="page page-test">
      <!-- 背景效果 -->
      <div class="bg-gradient-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
      </div>
      <div class="bg-grid"></div>
      
      <div class="progress-text">
        <span id="current-q">1</span>/<span id="total-q">60</span>
      </div>

      <main class="test-content">
        <div class="question-card">
          <!-- 按钮移到卡片内部上方左右两侧 -->
          <div class="question-actions">
            <button id="exit-btn" class="btn btn-action btn-exit" title="退出测试">
              <svg viewBox="0 0 24 24">
                <path d="M18 6L6 18"/>
                <path d="M6 6l12 12"/>
              </svg>
              <span>退出</span>
            </button>
            <button id="prev-btn" class="btn btn-action btn-prev" title="上一题">
              <svg viewBox="0 0 24 24">
                <path d="M15 18l-6-6 6-6"/>
              </svg>
              <span>上一题</span>
            </button>
          </div>
          <!-- 隐藏 dimension-tag，保持 id 用于 JS -->
          <div id="dimension-tag" style="display: none;"></div>
          <h2 class="question-text" id="question-text">题目内容</h2>
          <div class="options-container" id="options-container">
            <button class="option-btn" data-value="2">
              <span class="option-emoji">😍</span>
              <span class="option-text">喜欢</span>
            </button>
            <button class="option-btn" data-value="1">
              <span class="option-emoji">😐</span>
              <span class="option-text">一般</span>
            </button>
            <button class="option-btn" data-value="0">
              <span class="option-emoji">😕</span>
              <span class="option-text">不喜欢</span>
            </button>
          </div>
        </div>
      </main>

      <footer class="test-footer">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </footer>

      <!-- 退出确认弹窗 -->
      <div id="exit-modal" class="modal">
        <div class="modal-content">
          <div class="modal-icon">
            <svg viewBox="0 0 24 24">
              <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
              <line x1="12" y1="9" x2="12" y2="13"/>
              <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
          </div>
          <h3>确定要退出测试吗？</h3>
          <p>退出后进度将丢失</p>
          <div class="modal-actions">
            <button id="cancel-exit" class="btn btn-secondary">继续测试</button>
            <button id="confirm-exit" class="btn btn-danger">确认退出</button>
          </div>
        </div>
      </div>
    </section>

    <!-- 结果页 -->
    <section id="result-page" class="page page-result">
      <!-- 背景效果 -->
      <div class="bg-gradient-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
      </div>
      <div class="bg-grid"></div>
      
      <div class="result-header">
        <h2 class="result-title">你的职业兴趣类型</h2>
      </div>

      <div class="result-main">
        <!-- 三字母代码 -->
        <div class="holland-code">
          <div class="code-letters" id="code-letters">
            <span class="code-letter" data-index="0">-</span>
            <span class="code-letter" data-index="1">-</span>
            <span class="code-letter" data-index="2">-</span>
          </div>
          <div class="code-dimensions" id="code-dimensions">
            <span class="code-dim" data-index="0"></span>
            <span class="code-dim" data-index="1"></span>
            <span class="code-dim" data-index="2"></span>
          </div>
        </div>

        <!-- 雷达图 -->
        <div class="radar-container">
          <canvas id="radar-chart"></canvas>
        </div>

        <!-- 六维度得分 -->
        <div class="dimensions-scores" id="dimensions-scores">
          <div class="score-item" data-dimension="R">
            <span class="score-label">
              <span class="dim-badge">R</span>
              实际型
            </span>
            <div class="score-bar">
              <div class="score-fill" data-value="0"></div>
            </div>
            <span class="score-value">0</span>
          </div>
          <div class="score-item" data-dimension="I">
            <span class="score-label">
              <span class="dim-badge">I</span>
              研究型
            </span>
            <div class="score-bar">
              <div class="score-fill" data-value="0"></div>
            </div>
            <span class="score-value">0</span>
          </div>
          <div class="score-item" data-dimension="A">
            <span class="score-label">
              <span class="dim-badge">A</span>
              艺术型
            </span>
            <div class="score-bar">
              <div class="score-fill" data-value="0"></div>
            </div>
            <span class="score-value">0</span>
          </div>
          <div class="score-item" data-dimension="S">
            <span class="score-label">
              <span class="dim-badge">S</span>
              社会型
            </span>
            <div class="score-bar">
              <div class="score-fill" data-value="0"></div>
            </div>
            <span class="score-value">0</span>
          </div>
          <div class="score-item" data-dimension="E">
            <span class="score-label">
              <span class="dim-badge">E</span>
              企业型
            </span>
            <div class="score-bar">
              <div class="score-fill" data-value="0"></div>
            </div>
            <span class="score-value">0</span>
          </div>
          <div class="score-item" data-dimension="C">
            <span class="score-label">
              <span class="dim-badge">C</span>
              常规型
            </span>
            <div class="score-bar">
              <div class="score-fill" data-value="0"></div>
            </div>
            <span class="score-value">0</span>
          </div>
        </div>
      </div>

      <!-- 性格解读 -->
      <div class="result-section result-interpretation">
        <h3 class="section-title">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          性格解读
        </h3>
        <div class="interpretation-content" id="interpretation-content">
          <p class="interpretation-text"></p>
        </div>
      </div>

      <!-- 职业推荐 -->
      <div class="result-section result-careers">
        <h3 class="section-title">
          <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          推荐职业
        </h3>
        <div class="careers-list" id="careers-list"></div>
      </div>

      <div class="result-footer">
        <button id="restart-btn" class="btn btn-primary btn-restart">
          <svg viewBox="0 0 24 24">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          重新测试
        </button>
      </div>
    </section>
  </div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
