<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测测你的恋爱属性 - 12道题揭示你的恋爱人格</title>
    <meta name="description" content="12道恋爱心理测试，揭示你隐藏的恋爱属性。纯爱战士、恋爱脑、清醒海王...你是哪一种？">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <canvas id="heart-bg"></canvas>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <a href="#" class="logo" onclick="showPage('home'); return false;">
                <span class="logo-icon">💕</span>
                <span class="logo-text">恋爱属性测试</span>
            </a>
        </header>

        <!-- Home Page -->
        <div id="home-page" class="page active">
            <div class="hero-card">
                <div class="hero-content">
                    <h1 class="hero-title">测测你的<br>恋爱属性</h1>
                    <p class="hero-subtitle">12道心理测试，揭示你最真实的恋爱人格<br>你是纯爱战士？还是清醒海王？</p>
                    <button class="start-btn" onclick="startTest()">
                        开始测试
                        <span class="arrow">→</span>
                    </button>
                </div>
            </div>

            <div class="features">
                <div class="feature-card">
                    <div class="feature-icon">⏱️</div>
                    <div class="feature-title">快速测试</div>
                    <div class="feature-desc">约3分钟完成</div>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">💕</div>
                    <div class="feature-title">8种属性</div>
                    <div class="feature-desc">精准匹配你的类型</div>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">✨</div>
                    <div class="feature-title">科学有趣</div>
                    <div class="feature-desc">揭示真实恋爱观</div>
                </div>
            </div>
        </div>

        <!-- Quiz Page -->
        <div id="quiz-page" class="page">
            <div class="quiz-container">
                <div class="quiz-header">
                    <button class="quit-btn" onclick="quitQuiz()">← 退出</button>
                    <button class="prev-btn hidden" id="prev-btn" onclick="prevQuestion()">← 上一题</button>
                </div>

                <div class="progress-container">
                    <div class="progress-info">
                        <span>问题 <span id="current-num">1</span> / <span id="total-num">12</span></span>
                        <span id="progress-percent">8%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill" style="width: 8%"></div>
                    </div>
                </div>

                <div class="question-number" id="question-number">第 1 题</div>
                <div class="question-text" id="question-text"></div>

                <div class="options-list" id="options-list"></div>

                <button class="next-btn" id="next-btn" onclick="nextQuestion()">
                    下一题 <span class="arrow">→</span>
                </button>
            </div>
        </div>

        <!-- Results Page -->
        <div id="results-page" class="page">
            <div class="results-header">
                <h1 class="results-title">测试完成！</h1>
                <p class="results-subtitle">你的恋爱属性是</p>
            </div>

            <div class="result-card" id="result-card">
                <div class="result-emoji" id="result-emoji"></div>
                <div class="result-name" id="result-name"></div>
                <div class="result-description" id="result-description"></div>
                <div class="result-tags" id="result-tags"></div>
                <div class="result-advice" id="result-advice"></div>
            </div>

            <div class="result-actions">
                <button class="action-btn primary" onclick="showPage('home')">
                    💕 重新测试
                </button>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
